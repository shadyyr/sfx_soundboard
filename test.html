<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>annabelle.sfx — device diagnostics</title>
  <style>
    body { background: #141e19; color: #e8f1ec; font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; margin: 0; padding: 1rem; font-size: 14px; line-height: 1.5; }
    h1 { font-size: 1rem; margin: 0 0 0.75rem; }
    #verdict { padding: 0.9rem 1rem; border-radius: 12px; font-weight: bold; margin: 0 0 0.75rem; }
    #verdict.pending { background: #23342b; color: #d9c37e; }
    #verdict.good { background: #2d6a4f; color: #eaf4ee; }
    #verdict.bad { background: #6a2d2d; color: #f4d9d9; }
    #tap { width: 100%; padding: 1.25rem; font: inherit; font-size: 1.05rem; font-weight: bold; background: #2d6a4f; color: #eaf4ee; border: 0; border-radius: 12px; margin: 0 0 1rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .row { padding: 0.35rem 0; border-bottom: 1px solid #23342b; word-break: break-word; }
    .ok::before   { content: "PASS  "; color: #7fc8a9; font-weight: bold; white-space: pre; }
    .fail::before { content: "FAIL  "; color: #e08a8a; font-weight: bold; white-space: pre; }
    .warn::before { content: "WARN  "; color: #d9c37e; font-weight: bold; white-space: pre; }
    .info::before { content: "INFO  "; color: #93aca0; white-space: pre; }
    .ask { background: #23342b; border-radius: 10px; padding: 0.6rem; margin: 0.4rem 0; }
    .ask button { font: inherit; font-weight: bold; border: 0; border-radius: 8px; padding: 0.55rem 0.8rem; margin: 0.4rem 0.5rem 0 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .ask .yes-btn { background: #2d6a4f; color: #eaf4ee; }
    .ask .no-btn { background: #6a2d2d; color: #f4d9d9; }
  </style>
</head>
<body>
  <h1>annabelle.sfx — device diagnostics</h1>
  <div id="verdict" class="pending">starting checks…</div>
  <button id="tap" type="button">PRESS and HOLD ~2 seconds, then release</button>
  <button id="ka-toggle" type="button" style="width:100%;padding:0.7rem;font:inherit;font-size:0.85rem;background:#23342b;color:#d9c37e;border:0;border-radius:10px;margin:0 0 1rem;">pause keep-alive (A/B latency test)</button>
  <div id="log"></div>
  <script>
    (() => {
      "use strict";
      const logEl = document.getElementById("log");
      const verdictEl = document.getElementById("verdict");
      const timeout = (ms, val) => new Promise((r) => setTimeout(() => r(val), ms));
      const errText = (e) => (e && e.message ? e.message : String(e));

      // ---- verdict state ----
      let failCount = 0;
      let decodeDone = false;
      let firstTapDone = false;
      let unlockOk = false;
      let toneOk = false;          // user-confirmed audible
      let wasBackgrounded = false;
      let recoveryOk = false;      // user-confirmed audible on a tap after backgrounding
      let exhausted = false;

      function updateVerdict() {
        if (failCount > 0 || exhausted) {
          verdictEl.className = "bad";
          verdictEl.textContent = exhausted
            ? "audio unrecoverable on this run — send Claude a screenshot of the rows below"
            : "problems found — " + failCount + " failed check" + (failCount > 1 ? "s" : "") + ", see rows below";
        } else if (!decodeDone || !firstTapDone) {
          verdictEl.className = "pending";
          verdictEl.textContent = decodeDone
            ? "so far so good — press and HOLD the green button ~2s, then release"
            : "running checks…";
        } else if (!unlockOk || !toneOk) {
          verdictEl.className = "pending";
          verdictEl.textContent = "waiting for unlock and tone confirmation…";
        } else if (!recoveryOk) {
          verdictEl.className = "pending";
          verdictEl.textContent = "all checks passed so far — last one: leave this tab (switch apps or lock the phone) for a few minutes, come back, and tap the button once more";
        } else {
          verdictEl.className = "good";
          verdictEl.textContent = "all good! every check passed — including recovery after backgrounding";
        }
      }

      const row = (cls, text) => {
        const d = document.createElement("div");
        d.className = "row " + cls;
        d.textContent = text;
        logEl.append(d);
        if (cls === "fail") failCount++;
        updateVerdict();
        return d;
      };

      window.addEventListener("error", (e) => row("fail", "uncaught error: " + e.message));
      window.addEventListener("unhandledrejection", (e) => row("fail", "unhandled rejection: " + errText(e.reason)));

      // ---- audio session helpers ----
      const hasSession = "audioSession" in navigator;
      function sessionInfo() {
        return hasSession ? navigator.audioSession.type + "/" + navigator.audioSession.state : "n/a";
      }
      if (hasSession && "addEventListener" in navigator.audioSession) {
        try {
          navigator.audioSession.addEventListener("statechange", () =>
            row("info", "audioSession state → " + sessionInfo()));
        } catch (err) { /* older impl */ }
      }

      // ---- environment ----
      row("info", "user agent: " + navigator.userAgent);
      row("info", "secure context: " + window.isSecureContext + (window.isSecureContext ? "" : " — SW/cache tests unavailable here (expected over LAN HTTP)"));
      row("info", "display mode: " + (matchMedia("(display-mode: standalone)").matches ? "standalone (installed app)" : "browser tab"));

      // ---- AudioContext (rebuildable, mirroring the app) ----
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { row("fail", "AudioContext not available in this browser"); return; }

      function makeCtx() {
        const c = new AC();
        if (hasSession) {
          try { navigator.audioSession.type = "playback"; } catch (err) { /* older Safari */ }
        }
        c.addEventListener("statechange", () =>
          row("info", "AudioContext state changed → " + c.state + " (clock: " + c.currentTime.toFixed(2) + "s, session: " + sessionInfo() + ")"));
        return c;
      }
      let ctx = makeCtx();
      row("ok", "AudioContext created — state: " + ctx.state + ", sampleRate: " + ctx.sampleRate + ", session: " + sessionInfo());

      function rebuildCtx() {
        try { ctx.close().catch(() => {}); } catch (err) { /* already closed */ }
        ctx = makeCtx();
        if (ctx.state !== "running") ctx.resume().catch(() => {});
        row("info", "rebuilt a fresh AudioContext — state: " + ctx.state + ", session: " + sessionInfo());
      }

      if (hasSession) {
        row("ok", 'audioSession supported — type set to "playback" (silent switch should not mute audio)');
      } else {
        row("warn", "navigator.audioSession not supported (iOS < 16.4?) — ringer on silent WILL mute web audio");
      }

      // ---- session keep-alive: looping silent <audio>, same as the app ----
      let keepAliveEl = null;
      function silentWavUrl() {
        const rate = 8000, n = rate;
        const bytes = new Uint8Array(44 + n);
        const dv = new DataView(bytes.buffer);
        const str = (off, s) => { for (let i = 0; i < s.length; i++) bytes[off + i] = s.charCodeAt(i); };
        str(0, "RIFF"); dv.setUint32(4, 36 + n, true); str(8, "WAVE");
        str(12, "fmt "); dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
        dv.setUint32(24, rate, true); dv.setUint32(28, rate, true); dv.setUint16(32, 1, true); dv.setUint16(34, 8, true);
        str(36, "data"); dv.setUint32(40, n, true);
        bytes.fill(128, 44);
        return URL.createObjectURL(new Blob([bytes], { type: "audio/wav" }));
      }
      function holdSession(logIt) {
        if (!keepAliveEl) {
          keepAliveEl = new Audio(silentWavUrl());
          keepAliveEl.loop = true;
          keepAliveEl.setAttribute("playsinline", "");
          ["play", "playing", "pause", "suspend", "stalled", "waiting"].forEach((ev) =>
            keepAliveEl.addEventListener(ev, () =>
              row("info", "keep-alive event: " + ev + " (visibility: " + document.visibilityState + ")")));
        }
        if (!keepAliveEl.paused) { if (logIt) row("info", "keep-alive loop already playing"); return; }
        keepAliveEl.play().then(
          () => { if (logIt) row("ok", "keep-alive silent loop playing — session held"); },
          (err) => { if (logIt) row("warn", "keep-alive play blocked: " + errText(err)); }
        );
      }
      const keepAliveStatus = () =>
        !keepAliveEl ? "not created" : keepAliveEl.paused ? "PAUSED" : "playing";

      const latencyInfo = () => {
        const base = ctx.baseLatency !== undefined ? (ctx.baseLatency * 1000).toFixed(1) + "ms" : "n/a";
        const out = ctx.outputLatency !== undefined ? (ctx.outputLatency * 1000).toFixed(1) + "ms" : "n/a";
        return "baseLatency=" + base + " outputLatency=" + out;
      };

      document.getElementById("ka-toggle").addEventListener("click", (e) => {
        const btn = e.target;
        if (!keepAliveEl || keepAliveEl.paused) {
          holdSession(true);
          btn.textContent = "pause keep-alive (A/B latency test)";
          row("info", "A/B: keep-alive resumed — tap the green button and note the delay (" + latencyInfo() + ")");
        } else {
          keepAliveEl.pause();
          btn.textContent = "resume keep-alive (A/B latency test)";
          row("info", "A/B: keep-alive paused — tap the green button and compare the delay (" + latencyInfo() + ")");
        }
      });

      // ---- background/foreground transitions ----
      document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState === "hidden") {
          wasBackgrounded = true;
          // NOT pausing the keep-alive — mirrors the app: a playback session
          // may continue in the background, keeping return-to-tab instant
          row("info", "page hidden — state: " + ctx.state + ", session: " + sessionInfo() + ", keep-alive: " + keepAliveStatus());
          return;
        }
        if (keepAliveEl) holdSession(true); // resume attempt without a gesture
        const t0 = ctx.currentTime;
        await timeout(300);
        row("info", "page visible again — state: " + ctx.state + ", clock advancing: " + (ctx.currentTime > t0) + ", session: " + sessionInfo() + ", keep-alive: " + keepAliveStatus());
      });

      // ---- service worker + caches ----
      (async () => {
        if (!("serviceWorker" in navigator)) { row("warn", "serviceWorker API unavailable"); return; }
        const reg = await navigator.serviceWorker.getRegistration();
        if (!reg) {
          row("warn", "no service worker registered" + (window.isSecureContext ? " — visit the main app page first, then reload this page" : " (expected on insecure origin)"));
          return;
        }
        const state = reg.active ? "active" : reg.installing ? "installing" : reg.waiting ? "waiting" : "registered";
        row("ok", "service worker: " + state);
        row("info", "this page controlled by SW: " + !!navigator.serviceWorker.controller);
        if ("caches" in window) {
          const names = await caches.keys();
          row("info", "cache names on origin: " + (names.join(", ") || "(none)"));
        }
      })().catch((err) => row("fail", "service worker check error: " + errText(err)));

      // ---- decode every sound in the manifest ----
      let kickFile = null; // shortest decoded file, used by the media-element kick
      let kickDur = Infinity;
      (async () => {
        let manifest;
        try {
          const res = await fetch("sounds/manifest.json", { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          manifest = await res.json();
          row("ok", "manifest.json loaded — " + manifest.sounds.filter((s) => s && s.file).length + " sound entries");
        } catch (err) {
          row("fail", "manifest.json: " + errText(err));
          decodeDone = true;
          updateVerdict();
          return;
        }
        let pass = 0, fail = 0;
        for (const entry of manifest.sounds) {
          if (!entry || !entry.file) continue;
          try {
            const res = await fetch("sounds/" + encodeURIComponent(entry.file), { cache: "no-cache" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const buf = await ctx.decodeAudioData(await res.arrayBuffer());
            if (buf.duration < kickDur) { kickDur = buf.duration; kickFile = entry.file; }
            pass++;
            row("ok", entry.file + " decoded — " + buf.duration.toFixed(2) + "s, " + buf.numberOfChannels + "ch");
          } catch (err) {
            fail++;
            row("fail", entry.file + " failed to decode: " + errText(err));
          }
        }
        decodeDone = true;
        row(fail === 0 ? "ok" : "fail", "decode summary: " + pass + " passed, " + fail + " failed");
      })();

      // ---- tone playback (rendering only — audibility is asked separately) ----
      async function playTone() {
        const sr = ctx.sampleRate;
        const buf = ctx.createBuffer(1, Math.floor(sr * 0.4), sr);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < ch.length; i++) {
          const t = i / sr;
          ch[i] = Math.sin(2 * Math.PI * 440 * t) * Math.exp(-6 * t) * 0.5;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        const started = ctx.currentTime;
        const ended = new Promise((r) => { src.onended = () => r(true); });
        src.start();
        const finished = await Promise.race([ended, timeout(2000, false)]);
        if (finished) {
          row("info", "tone rendered — onended fired, clock advanced " + (ctx.currentTime - started).toFixed(2) + "s, session: " + sessionInfo() + ", " + latencyInfo());
        } else {
          row("warn", "tone did NOT finish within 2s — context clock frozen, session: " + sessionInfo());
        }
        return finished;
      }

      // ---- recovery ladder: tried one step at a time when the user reports silence ----
      let ladderStep = 0;
      const ladder = [
        {
          name: "re-assert audioSession.type",
          fn: async () => {
            if (!hasSession) { row("info", "audioSession unsupported — step is a no-op"); return; }
            try {
              navigator.audioSession.type = "transient";
              await timeout(80);
              navigator.audioSession.type = "playback";
              row("info", "audioSession.type toggled transient → playback, session: " + sessionInfo());
            } catch (err) {
              row("warn", "audioSession toggle failed: " + errText(err));
            }
          },
        },
        {
          name: "media-element kick",
          fn: async () => {
            try {
              const el = new Audio("sounds/" + encodeURIComponent(kickFile || "incorrect-buzzer.wav"));
              await el.play();
              row("info", "HTML <audio> element is playing " + (kickFile || "incorrect-buzzer.wav") + " — note whether you heard THAT sound (it matters either way)");
              await timeout(1500);
              el.pause();
            } catch (err) {
              row("warn", "media element play failed: " + errText(err));
            }
          },
        },
        {
          name: "rebuild AudioContext",
          fn: async () => rebuildCtx(),
        },
        {
          name: "rebuild AudioContext + media kick",
          fn: async function () { rebuildCtx(); await ladder[1].fn(); },
        },
      ];

      async function nextLadderStep(returning) {
        if (ladderStep >= ladder.length) {
          exhausted = true;
          row("fail", "all " + ladder.length + " recovery strategies exhausted and still silent — screenshot these rows");
          updateVerdict();
          return;
        }
        const step = ladder[ladderStep++];
        row("info", "trying recovery " + ladderStep + "/" + ladder.length + ": " + step.name);
        await step.fn();
        await toneAndAsk(returning);
      }

      // ---- ask the human whether the tone was audible ----
      function askHeard(returning) {
        const d = document.createElement("div");
        d.className = "ask";
        d.id = "heard-q";
        d.textContent = "did you HEAR that beep?";
        const yes = document.createElement("button");
        yes.className = "yes-btn";
        yes.type = "button";
        yes.textContent = "yes, heard it";
        const no = document.createElement("button");
        no.className = "no-btn";
        no.type = "button";
        no.textContent = "no — silent";
        yes.addEventListener("click", () => {
          d.remove();
          const via = ladderStep > 0 ? " (after recovery: " + ladder[ladderStep - 1].name + ")" : "";
          row("ok", "user confirmed the beep was audible" + via);
          toneOk = true;
          if (returning) {
            recoveryOk = true;
            row("ok", "background recovery verified — audio audible after returning to this tab" + via);
          }
          updateVerdict();
        });
        no.addEventListener("click", () => {
          d.remove();
          row("warn", "user reports SILENCE (rendering state above says otherwise — iOS session disconnect)");
          nextLadderStep(returning);
        });
        d.append(document.createElement("br"), yes, no);
        logEl.append(d);
        d.scrollIntoView({ block: "nearest" });
      }

      async function toneAndAsk(returning) {
        let rendered = await playTone();
        if (!rendered) {
          row("warn", "frozen clock — rebuilding the AudioContext and retrying (the app does this automatically)");
          rebuildCtx();
          await playTone();
        }
        askHeard(returning);
      }

      // ---- unlock + replay tests (driven by the big button) ----
      const tapBtn = document.getElementById("tap");

      tapBtn.addEventListener("pointerdown", async (e) => {
        if (firstTapDone) return;
        row("info", "pointerdown (" + e.pointerType + ") — state: " + ctx.state + ", session: " + sessionInfo());
        if (ctx.state === "running") {
          row("info", "context already running before any unlock attempt (desktop-like autoplay policy)");
          return;
        }
        const result = await Promise.race([ctx.resume().then(() => "fulfilled"), timeout(1500, "no response in 1500ms")]);
        row(result === "fulfilled" ? "ok" : "warn",
          "resume() on pointerdown: " + result + " — state now: " + ctx.state +
          (result === "fulfilled" ? "" : " (expected on iOS; pointerup should succeed)"));
      });

      tapBtn.addEventListener("pointerup", async () => {
        if (!firstTapDone) {
          firstTapDone = true;
          if (ctx.state !== "running") {
            const result = await Promise.race([ctx.resume().then(() => "fulfilled"), timeout(1500, "no response in 1500ms")]);
            row(result === "fulfilled" ? "ok" : "fail", "resume() on pointerup: " + result + " — state now: " + ctx.state);
          } else {
            row("info", "context already running by pointerup");
          }
          unlockOk = ctx.state === "running";
          row(unlockOk ? "ok" : "fail", "unlock result — AudioContext state: " + ctx.state + ", session: " + sessionInfo());
          holdSession(true); // start the session keep-alive from this gesture
          await toneAndAsk(false);
          tapBtn.textContent = "TAP to test again (after backgrounding / ringer on silent)";
          row("info", "NEXT: (a) flip the ringer to silent and tap — beep should still sound; (b) leave this tab for a few minutes, come back, tap — then answer the hear question honestly");
        } else {
          const returning = wasBackgrounded;
          wasBackgrounded = false;
          ladderStep = 0; // each tap cycle starts the recovery ladder fresh
          holdSession(false); // tap gesture restarts the keep-alive if it was blocked
          if (returning) row("info", "tap after backgrounding — state: " + ctx.state + ", session: " + sessionInfo() + ", keep-alive: " + keepAliveStatus());
          if (ctx.state !== "running") {
            const ok = await Promise.race([ctx.resume().then(() => true, () => false), timeout(600, false)]);
            row(ok && ctx.state === "running" ? "ok" : "warn",
              "resume attempt: " + (ok ? "fulfilled" : "no response in 600ms") + " — state: " + ctx.state);
            if (ctx.state !== "running") rebuildCtx();
          }
          toneAndAsk(returning);
        }
      });
    })();
  </script>
</body>
</html>
